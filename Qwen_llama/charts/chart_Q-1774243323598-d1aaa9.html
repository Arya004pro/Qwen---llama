<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Categories matching threshold filter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 16px}
.card{background:#1a1d27;border:1px solid #2d3148;border-radius:12px;padding:28px 32px;width:100%;max-width:920px}
h1{font-size:18px;font-weight:600;color:#f1f5f9;margin-bottom:4px}
.sub{font-size:13px;color:#64748b;margin-bottom:28px}
.tok{margin-top:24px;background:#12141e;border:1px solid #2d3148;border-radius:8px;padding:12px 16px;font-size:12px;color:#64748b;display:flex;gap:24px;flex-wrap:wrap}
.tok span{color:#94a3b8}
</style>
</head>
<body>
<div class="card">
<h1>Categories matching threshold filter</h1>
<p class="sub">2024-01-01 to 2024-12-31</p>
<canvas id="c"></canvas>
<div class="tok">Token usage — <span>prompt: 386</span><span>completion: 669</span><span>total: 1055</span></div>
</div>
<script>
new Chart(document.getElementById('c'),{
  "data": {
    "datasets": [
      {
        "backgroundColor": [
          "rgba(99,  179, 237, 0.85)",
          "rgba(104, 211, 145, 0.85)",
          "rgba(246, 173,  85, 0.85)",
          "rgba(252, 129, 129, 0.85)"
        ],
        "borderColor": [
          "rgba(99,  179, 237, 1)",
          "rgba(104, 211, 145, 1)",
          "rgba(246, 173,  85, 1)",
          "rgba(252, 129, 129, 1)"
        ],
        "borderRadius": 4,
        "borderWidth": 1,
        "data": [
          25850000.0,
          24302868.0,
          12960000.0,
          9534000.0
        ],
        "label": "Revenue"
      }
    ],
    "labels": [
      "Laptops",
      "Furniture",
      "Electronics",
      "Mobiles"
    ]
  },
  "options": {
    "indexAxis": "y",
    "maintainAspectRatio": true,
    "plugins": {
      "legend": {
        "display": false
      },
      "tooltip": {
        "backgroundColor": "#1e2130",
        "bodyColor": "#94a3b8",
        "borderColor": "#2d3148",
        "borderWidth": 1,
        "callbacks": {
          "label": "function(c){return ' \u20b9'+c.raw.toLocaleString('en-IN',{minimumFractionDigits:2})}"
        },
        "titleColor": "#e2e8f0"
      }
    },
    "responsive": true,
    "scales": {
      "x": {
        "grid": {
          "color": "rgba(255,255,255,0.05)"
        },
        "ticks": {
          "callback": "function(v){return '\u20b9'+v.toLocaleString('en-IN')}",
          "color": "#94a3b8",
          "font": {
            "size": 11
          }
        }
      },
      "y": {
        "beginAtZero": true,
        "grid": {
          "color": "rgba(255,255,255,0.05)"
        },
        "ticks": {
          "color": "#94a3b8",
          "font": {
            "size": 11
          }
        }
      }
    }
  },
  "type": "bar"
});
</script>
</body>
</html>
