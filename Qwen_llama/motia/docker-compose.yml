services:
  motia-engine:
    build:
      context: ..
      dockerfile: motia/Dockerfile
    ports:
      - "3113:3113"   # iii-console UI — open this in your browser
      - "3111:3111"   # engine HTTP API
      - "3112:3112"   # engine websocket 
      - "3121:3121"   # REST API
      - "3124:3124"   # Streams
      - "49134:49134" # Internal
    env_file:
      - ../.env
    volumes:
      - ./steps:/app/motia/steps
      - ./data:/app/motia/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3121/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s