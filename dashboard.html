<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Analytics — Live Pipeline</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0f1117;
  --surface: #1a1d27;
  --border:  #2d3148;
  --text:    #e2e8f0;
  --muted:   #64748b;
  --accent:  #6366f1;
  --success: #10b981;
  --warn:    #f59e0b;
  --error:   #ef4444;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
header {
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
header h1 { font-size: 16px; font-weight: 600; }
.badge {
  font-size: 11px;
  padding: 2px 8px;
  background: rgba(99,102,241,.12);
  color: #818cf8;
  border: 1px solid rgba(99,102,241,.3);
  border-radius: 12px;
  margin-left: 4px;
}
.api-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #64748b;
  flex-shrink: 0;
  transition: background .3s, box-shadow .3s;
}
.api-dot.ok  { background: var(--success); box-shadow: 0 0 6px var(--success); }
.api-dot.err { background: var(--error);   box-shadow: 0 0 6px var(--error); }

/* ── Main ── */
main {
  flex: 1;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-width: 960px;
  width: 100%;
  margin: 0 auto;
}

/* ── Card base ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 20px;
}
.card-title {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .1em;
  margin-bottom: 18px;
}

/* ── Pipeline steps ── */
.steps {
  display: flex;
  align-items: flex-start;
}

.step {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
  position: relative;
}

/* connector line between steps */
.step:not(:last-child)::after {
  content: '';
  position: absolute;
  top: 20px;
  left: 50%;
  width: 100%;
  height: 2px;
  background: var(--border);
  transition: background .4s;
  z-index: 0;
}
.step.done:not(:last-child)::after   { background: var(--success); }
.step.active:not(:last-child)::after { background: linear-gradient(to right, var(--success), var(--border)); }

/* circle icon */
.step-circle {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  z-index: 1;
  position: relative;
  transition: border-color .3s, background .3s, box-shadow .3s;
  user-select: none;
}
.step.active .step-circle {
  border-color: var(--accent);
  color: var(--accent);
  animation: pulse 1.6s ease-in-out infinite;
}
.step.done .step-circle {
  border-color: var(--success);
  background: rgba(16,185,129,.1);
  color: var(--success);
}
.step.error .step-circle {
  border-color: var(--error);
  background: rgba(239,68,68,.1);
  color: var(--error);
}

@keyframes pulse {
  0%,100% { box-shadow: 0 0 0   4px rgba(99,102,241,.15); }
  50%      { box-shadow: 0 0 0  10px rgba(99,102,241,.35); }
}

.step-name {
  margin-top: 8px;
  font-size: 11px;
  font-weight: 500;
  text-align: center;
  color: var(--muted);
  max-width: 78px;
  line-height: 1.35;
  transition: color .3s;
}
.step.active .step-name,
.step.done   .step-name { color: var(--text); }

.step-sub {
  margin-top: 3px;
  font-size: 10px;
  color: var(--muted);
  text-align: center;
  max-width: 78px;
  line-height: 1.3;
}
.step.active .step-sub { color: #818cf8; }

/* ── Clarification banner ── */
.clarify-card {
  background: rgba(245,158,11,.07);
  border: 1px solid rgba(245,158,11,.3);
  border-radius: 10px;
  padding: 14px 16px;
  display: none;
}
.clarify-card.show { display: block; }
.clarify-msg { font-size: 13px; color: #fbbf24; margin-bottom: 10px; line-height: 1.5; }
.clarify-row { display: flex; gap: 8px; }

/* ── Detail grid ── */
.detail-grid {
  display: none;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.detail-grid.show { display: grid; }

.token-table { display: flex; flex-direction: column; gap: 0; }
.token-row {
  display: flex; justify-content: space-between;
  font-size: 12px;
  padding: 5px 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.token-row:last-child { border-bottom: none; }
.token-row .lbl { color: var(--muted); }
.token-row .val { color: var(--text); font-weight: 500; font-variant-numeric: tabular-nums; }
.token-total .lbl,
.token-total .val { color: var(--text); font-weight: 600; }

.sql-wrap {
  background: #080a10;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-family: "Cascadia Code", "Fira Code", Consolas, monospace;
  font-size: 11px;
  line-height: 1.6;
  color: #93c5fd;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 150px;
  overflow-y: auto;
  margin-top: 4px;
}

/* ── Result card ── */
.result-card { display: none; }
.result-card.show { display: block; }

.result-text {
  font-size: 14px;
  line-height: 1.75;
  color: var(--text);
  white-space: pre-wrap;
}

.chart-btn {
  display: none;
  align-items: center;
  gap: 6px;
  margin-top: 14px;
  padding: 7px 14px;
  background: rgba(99,102,241,.1);
  border: 1px solid rgba(99,102,241,.3);
  border-radius: 7px;
  color: #818cf8;
  font-size: 12px;
  font-weight: 500;
  text-decoration: none;
  cursor: pointer;
  transition: background .15s;
}
.chart-btn:hover { background: rgba(99,102,241,.18); }
.chart-btn.show { display: inline-flex; }

/* ── Star / Bookmark button ── */
.star-btn {
  display: none;
  align-items: center;
  gap: 6px;
  margin-top: 10px;
  margin-left: 6px;
  padding: 7px 14px;
  background: rgba(245,158,11,.08);
  border: 1px solid rgba(245,158,11,.25);
  border-radius: 7px;
  color: #fbbf24;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: background .15s, border-color .15s, transform .12s;
}
.star-btn:hover { background: rgba(245,158,11,.18); transform: scale(1.04); }
.star-btn.show { display: inline-flex; }
.star-btn.starred {
  background: rgba(245,158,11,.22);
  border-color: rgba(245,158,11,.55);
  color: #f59e0b;
}
.star-btn.starred .star-icon { filter: drop-shadow(0 0 4px #f59e0b); }

/* ── Result action row ── */
.result-actions {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 4px;
  margin-top: 4px;
}

/* ── Bookmarks panel ── */
.bookmarks-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.bookmarks-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  cursor: pointer;
  user-select: none;
  border-bottom: 1px solid transparent;
  transition: border-color .2s;
}
.bookmarks-header.open { border-bottom-color: var(--border); }
.bookmarks-header-left {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .08em;
}
.bookmarks-count {
  background: rgba(245,158,11,.18);
  color: #f59e0b;
  border: 1px solid rgba(245,158,11,.35);
  border-radius: 10px;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 7px;
  min-width: 20px;
  text-align: center;
}
.bookmarks-toggle-icon {
  font-size: 11px;
  color: var(--muted);
  transition: transform .25s;
}
.bookmarks-header.open .bookmarks-toggle-icon { transform: rotate(180deg); }
.bookmarks-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height .3s ease;
}
.bookmarks-body.open { max-height: 2000px; }

.bookmark-item {
  padding: 14px 18px;
  border-bottom: 1px solid rgba(255,255,255,.04);
  display: flex;
  gap: 12px;
  align-items: flex-start;
  animation: bm-in .25s ease both;
}
.bookmark-item:last-child { border-bottom: none; }
@keyframes bm-in {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.bookmark-meta {
  flex: 1;
  min-width: 0;
}
.bookmark-query {
  font-size: 12px;
  font-weight: 600;
  color: #818cf8;
  margin-bottom: 5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bookmark-result {
  font-size: 12px;
  color: var(--text);
  line-height: 1.6;
  white-space: pre-wrap;
  max-height: 80px;
  overflow: hidden;
  position: relative;
}
.bookmark-result::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 28px;
  background: linear-gradient(transparent, var(--surface));
}
.bookmark-timestamp {
  font-size: 10px;
  color: var(--muted);
  margin-top: 4px;
}
.bookmark-del-btn {
  background: none;
  border: 1px solid rgba(239,68,68,.3);
  border-radius: 6px;
  color: #ef4444;
  font-size: 11px;
  padding: 3px 8px;
  cursor: pointer;
  flex-shrink: 0;
  transition: background .12s;
  margin-top: 2px;
}
.bookmark-del-btn:hover { background: rgba(239,68,68,.1); }
.bookmarks-empty {
  padding: 22px 18px;
  font-size: 12px;
  color: var(--muted);
  text-align: center;
}

/* ── Toast notification ── */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: #1e2030;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 9px 18px;
  font-size: 13px;
  color: var(--text);
  opacity: 0;
  pointer-events: none;
  transition: opacity .22s, transform .22s;
  z-index: 999;
  white-space: nowrap;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Footer ── */
footer {
  padding: 12px 24px 16px;
  border-top: 1px solid var(--border);
  background: var(--surface);
}

.status-bar {
  max-width: 960px;
  margin: 0 auto 8px;
  font-size: 11px;
  color: var(--muted);
  min-height: 15px;
}

.input-row {
  max-width: 960px;
  margin: 0 auto;
  display: flex;
  gap: 10px;
}

.q-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color .15s;
}
.q-input:focus { border-color: var(--accent); }
.q-input::placeholder { color: var(--muted); }

.send-btn {
  padding: 10px 22px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity .15s;
  white-space: nowrap;
}
.send-btn:disabled { opacity: .38; cursor: not-allowed; }
.send-btn:not(:disabled):hover { opacity: .88; }
</style>
</head>
<body>

<header>
  <div class="api-dot" id="api-dot"></div>
  <h1>Data Analytics</h1>
  <span class="badge">Live pipeline</span>
  <span style="margin-left:auto;font-size:11px;color:var(--muted)" id="query-id-label"></span>
</header>

<main>

  <!-- Pipeline steps -->
  <div class="card">
    <div class="card-title">Pipeline steps</div>
    <div class="steps" id="steps-row"></div>
  </div>

  <!-- Clarification -->
  <div class="clarify-card" id="clarify-card">
    <div class="clarify-msg" id="clarify-msg"></div>
    <div class="clarify-row">
      <input class="q-input" id="clarify-input"
        placeholder="Your answer…"
        onkeydown="if(event.key==='Enter') sendClarification()">
      <button class="send-btn" onclick="sendClarification()" style="padding:9px 16px">Reply</button>
    </div>
  </div>

  <!-- Detail: tokens + SQL -->
  <div class="detail-grid" id="detail-grid">
    <div class="card" style="padding:14px 16px">
      <div class="card-title" style="margin-bottom:10px">Token usage</div>
      <div class="token-table" id="token-table">
        <div class="token-row"><span class="lbl">No data yet</span><span class="val">—</span></div>
      </div>
    </div>
    <div class="card" style="padding:14px 16px">
      <div class="card-title" style="margin-bottom:6px">Generated SQL</div>
      <div class="sql-wrap" id="sql-wrap">Waiting for SQL generation…</div>
    </div>
  </div>

  <!-- Pinned / Bookmarks panel -->
  <div class="bookmarks-panel" id="bookmarks-panel">
    <div class="bookmarks-header" id="bookmarks-header" onclick="toggleBookmarksPanel()">
      <div class="bookmarks-header-left">
        <span>⭐</span>
        <span>Pinned Results</span>
        <span class="bookmarks-count" id="bookmarks-count">0</span>
      </div>
      <span class="bookmarks-toggle-icon" id="bookmarks-toggle-icon">▼</span>
    </div>
    <div class="bookmarks-body" id="bookmarks-body">
      <div class="bookmarks-empty" id="bookmarks-empty">No pinned results yet — star a result to save it here.</div>
    </div>
  </div>

  <!-- Result -->
  <div class="card result-card" id="result-card">
    <div class="card-title">Result</div>
    <div class="result-text" id="result-text"></div>
    <div class="result-actions">
      <a class="chart-btn" id="chart-btn" target="_blank">View chart ↗</a>
      <button class="star-btn" id="star-btn" onclick="toggleBookmark()"><span class="star-icon">⭐</span> <span id="star-label">Pin result</span></button>
    </div>
  </div>

</main>

<footer>
  <div class="status-bar" id="status-bar">Ready — enter a query below</div>
  <div class="input-row">
    <input class="q-input" id="query-input"
      placeholder="e.g. Top 5 items by revenue in March 2024"
      onkeydown="if(event.key==='Enter') sendQuery()">
    <button class="send-btn" id="send-btn" onclick="sendQuery()">Send</button>
  </div>
</footer>

<script>
/* ─── Config ─────────────────────────────────────────────────── */
const API = 'http://localhost:3121';

/* ─── Step definitions ───────────────────────────────────────── */
const STEPS = [
  { label: 'Receive',     sub: 'REST / queue',    icon: '⤵' },
  { label: 'Parse intent',sub: 'ConversationState',icon: '◈' },
  { label: 'Ambiguity',   sub: 'Qwen 3-32B',      icon: '?' },
  { label: 'Text → SQL',  sub: 'LLaMA 3.1-8B',    icon: '{}' },
  { label: 'Execute SQL', sub: 'PostgreSQL',       icon: '▶' },
  { label: 'Format',      sub: 'Chart.js',         icon: '✦' },
];

/*
  Motia status string → index of the LAST COMPLETED step (0-based, -1 = none yet)
  The step at (completedIdx + 1) is shown as "active" (pulsing).
*/
const STATUS_MAP = {
  'received':            0,
  'intent_parsed':       1,
  'ambiguity_checked':   2,
  'needs_clarification': 2,
  'schema_mapped':       3,
  'sql_generated':       3,
  'executed':            4,
  'completed':           5,
  'error':               5,   // handled separately
};

/* ─── State ──────────────────────────────────────────────────── */
let pollTimer       = null;
let currentQueryId  = null;
let pendingSession  = null;   // queryId to pass back on clarification

/* ─── Build step nodes ───────────────────────────────────────── */
function buildStepRow() {
  const row = document.getElementById('steps-row');
  row.innerHTML = '';
  STEPS.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'step';
    div.id = `step-${i}`;
    div.innerHTML = `
      <div class="step-circle" id="circle-${i}">${s.icon}</div>
      <div class="step-name"   id="name-${i}">${s.label}</div>
      <div class="step-sub"    id="sub-${i}">${s.sub}</div>`;
    row.appendChild(div);
  });
}

/* ─── Reset UI between queries ───────────────────────────────── */
function resetUI() {
  STEPS.forEach((s, i) => {
    const el = document.getElementById(`step-${i}`);
    el.className = 'step';
    document.getElementById(`circle-${i}`).textContent = s.icon;
  });
  document.getElementById('clarify-card').classList.remove('show');
  document.getElementById('detail-grid').classList.remove('show');
  document.getElementById('result-card').classList.remove('show');
  document.getElementById('result-card').style.borderColor = '';
  document.getElementById('chart-btn').classList.remove('show');
  document.getElementById('result-text').textContent = '';
  document.getElementById('sql-wrap').textContent = 'Waiting for SQL generation…';
  document.getElementById('token-table').innerHTML =
    '<div class="token-row"><span class="lbl">No data yet</span><span class="val">—</span></div>';
  document.getElementById('query-id-label').textContent = '';
}

/* ─── Render step states ─────────────────────────────────────── */
function renderSteps(completedIdx, isError) {
  STEPS.forEach((_, i) => {
    const el = document.getElementById(`step-${i}`);
    const circle = document.getElementById(`circle-${i}`);

    if (isError && i === completedIdx) {
      el.className = 'step error';
      circle.textContent = '✕';
    } else if (i <= completedIdx) {
      el.className = 'step done';
      circle.textContent = '✓';
    } else if (i === completedIdx + 1) {
      el.className = 'step active';
      circle.textContent = STEPS[i].icon;
    } else {
      el.className = 'step';
      circle.textContent = STEPS[i].icon;
    }
  });
}

/* ─── Token table ────────────────────────────────────────────── */
function renderTokens(usage, totals) {
  if (!usage || usage.length === 0) return;
  document.getElementById('detail-grid').classList.add('show');
  let html = '';
  usage.forEach(e => {
    const model = (e.model || '').split('/').pop().replace(/-instant$/, '');
    html += `<div class="token-row">
      <span class="lbl">${e.step}<br>
        <span style="font-size:10px;color:#475569">${model}</span>
      </span>
      <span class="val">${(e.total_tokens || 0).toLocaleString()}</span>
    </div>`;
  });
  if (totals && totals.total_tokens) {
    html += `<div class="token-row token-total" style="margin-top:6px;padding-top:8px;border-top:1px solid var(--border)">
      <span class="lbl">Total</span>
      <span class="val">${totals.total_tokens.toLocaleString()}</span>
    </div>`;
  }
  document.getElementById('token-table').innerHTML = html;
}

/* ─── Status bar helper ──────────────────────────────────────── */
function setStatus(msg) { document.getElementById('status-bar').textContent = msg; }

/* ─── API dot ────────────────────────────────────────────────── */
function setDot(ok) {
  const d = document.getElementById('api-dot');
  d.className = 'api-dot ' + (ok ? 'ok' : 'err');
}

/* ─── Send query ─────────────────────────────────────────────── */
async function sendQuery() {
  const input = document.getElementById('query-input');
  const q = input.value.trim();
  if (!q) return;

  resetUI();
  document.getElementById('send-btn').disabled = true;
  setStatus('Submitting query…');

  const body = { query: q };
  if (pendingSession) { body.sessionId = pendingSession; pendingSession = null; }

  try {
    const res  = await fetch(`${API}/query`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(body),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    setDot(true);

    currentQueryId = data.queryId;
    input.value    = '';
    document.getElementById('query-id-label').textContent = `ID: ${currentQueryId}`;
    setStatus(`Accepted — polling for updates…`);
    startPoll();
  } catch (e) {
    setDot(false);
    setStatus(`Error: Cannot reach Motia API at ${API} — is "npm run dev" running?`);
    document.getElementById('send-btn').disabled = false;
  }
}

/* ─── Clarification reply ────────────────────────────────────── */
async function sendClarification() {
  const input = document.getElementById('clarify-input');
  const q = input.value.trim();
  if (!q) return;
  input.value = '';
  document.getElementById('query-input').value = q;
  document.getElementById('clarify-card').classList.remove('show');
  await sendQuery();
}

/* ─── Polling ────────────────────────────────────────────────── */
function startPoll() {
  stopPoll();
  pollTimer = setInterval(poll, 700);
}
function stopPoll() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

async function poll() {
  try {
    const res  = await fetch(`${API}/query/${currentQueryId}`);
    if (!res.ok) return;
    const data = await res.json();
    setDot(true);
    handleState(data);
  } catch (_) { setDot(false); }
}

/* ─── Handle incoming state ──────────────────────────────────── */
function handleState(state) {
  const status = state.status || '';
  setStatus(`Status: ${status}`);

  const completedIdx = STATUS_MAP[status] ?? -1;
  const isError = status === 'error';

  renderSteps(completedIdx, isError);
  renderTokens(state.token_usage, state.token_totals);

  // Show SQL as soon as it appears in state
  if (state.generated_sql) {
    document.getElementById('detail-grid').classList.add('show');
    document.getElementById('sql-wrap').textContent = state.generated_sql.trim();
  }

  /* ── Terminal states ── */
  if (status === 'needs_clarification') {
    stopPoll();
    pendingSession = currentQueryId;
    document.getElementById('clarify-msg').textContent =
      state.clarification || 'Please clarify your query.';
    document.getElementById('clarify-card').classList.add('show');
    document.getElementById('send-btn').disabled = false;
    setStatus('Waiting for clarification');
    return;
  }

  if (status === 'completed') {
    stopPoll();
    showResult(state, false);
    document.getElementById('send-btn').disabled = false;
    setStatus('Done — ask another question');
    return;
  }

  if (status === 'error') {
    stopPoll();
    showResult(state, true);
    document.getElementById('send-btn').disabled = false;
    setStatus('Pipeline error — check Motia logs at http://localhost:3113/logs');
    return;
  }
}

/* ─── Show final result ──────────────────────────────────────── */
function showResult(state, isError) {
  const card = document.getElementById('result-card');
  if (isError) {
    card.style.borderColor = 'rgba(239,68,68,.35)';
    document.getElementById('result-text').textContent =
      '⚠  ' + (state.error || 'Unknown error.');
  } else {
    document.getElementById('result-text').textContent =
      state.formattedText || 'Query complete.';
    if (state.chart_config) {
      const btn = document.getElementById('chart-btn');
      btn.href = `${API}/query/${currentQueryId}/chart`;
      btn.classList.add('show');
    }
  }
  card.classList.add('show');
}

/* ─── Bookmarks (localStorage) ──────────────────────────────── */
const BM_KEY = 'sales_analytics_bookmarks';
let bookmarks = [];

function loadBookmarks() {
  try { bookmarks = JSON.parse(localStorage.getItem(BM_KEY)) || []; }
  catch (_) { bookmarks = []; }
}

function saveBookmarks() {
  localStorage.setItem(BM_KEY, JSON.stringify(bookmarks));
}

/* Current result being shown (set by showResult) */
let currentResult = null;

function toggleBookmark() {
  if (!currentResult) return;
  const id = currentResult.queryId;
  const idx = bookmarks.findIndex(b => b.queryId === id);
  if (idx === -1) {
    bookmarks.unshift({
      queryId:   id,
      query:     currentResult.query,
      text:      currentResult.text,
      timestamp: new Date().toISOString(),
    });
    saveBookmarks();
    renderBookmarks();
    setStar(true);
    showToast('⭐ Result pinned!');
  } else {
    bookmarks.splice(idx, 1);
    saveBookmarks();
    renderBookmarks();
    setStar(false);
    showToast('Unpinned');
  }
}

function setStar(starred) {
  const btn = document.getElementById('star-btn');
  const lbl = document.getElementById('star-label');
  if (starred) {
    btn.classList.add('starred');
    lbl.textContent = 'Pinned';
  } else {
    btn.classList.remove('starred');
    lbl.textContent = 'Pin result';
  }
}

function deleteBookmark(queryId) {
  bookmarks = bookmarks.filter(b => b.queryId !== queryId);
  saveBookmarks();
  renderBookmarks();
  // Update star button if current result is the deleted one
  if (currentResult && currentResult.queryId === queryId) setStar(false);
  showToast('Removed pin');
}

function renderBookmarks() {
  const body  = document.getElementById('bookmarks-body');
  const empty = document.getElementById('bookmarks-empty');
  const count = document.getElementById('bookmarks-count');
  count.textContent = bookmarks.length;

  if (bookmarks.length === 0) {
    empty.style.display = 'block';
    // Remove any existing items
    body.querySelectorAll('.bookmark-item').forEach(el => el.remove());
    return;
  }
  empty.style.display = 'none';

  // Rebuild list
  body.querySelectorAll('.bookmark-item').forEach(el => el.remove());
  bookmarks.forEach(bm => {
    const ts = new Date(bm.timestamp).toLocaleString();
    const item = document.createElement('div');
    item.className = 'bookmark-item';
    item.innerHTML = `
      <div class="bookmark-meta">
        <div class="bookmark-query">"${escHtml(bm.query || '')}"</div>
        <div class="bookmark-result">${escHtml(bm.text || '')}</div>
        <div class="bookmark-timestamp">${ts}</div>
      </div>
      <button class="bookmark-del-btn" onclick="deleteBookmark('${bm.queryId}')">Unpin</button>`;
    body.appendChild(item);
  });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleBookmarksPanel() {
  const header = document.getElementById('bookmarks-header');
  const bBody  = document.getElementById('bookmarks-body');
  const open   = bBody.classList.toggle('open');
  header.classList.toggle('open', open);
}

/* ─── Toast ───────────────────────────────────────────────────── */
let toastTimer = null;
function showToast(msg) {
  let t = document.getElementById('global-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'global-toast';
    t.className = 'toast';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ─── Patch showResult to track currentResult & star state ──── */
const _origShowResult = showResult;
function showResult(state, isError) {
  _origShowResult(state, isError);
  if (!isError) {
    currentResult = {
      queryId: currentQueryId,
      query:   document.getElementById('query-id-label').textContent
                 .replace('ID: ','').trim(),
      text:    state.formattedText || 'Query complete.',
    };
    // Store the query text from last input attempt (captured in sendQuery)
    if (window._lastQuery) currentResult.query = window._lastQuery;
    const alreadyStarred = bookmarks.some(b => b.queryId === currentQueryId);
    setStar(alreadyStarred);
    document.getElementById('star-btn').classList.add('show');
  } else {
    currentResult = null;
    document.getElementById('star-btn').classList.remove('show');
    setStar(false);
  }
}

/* ─── Patch sendQuery to capture last query text ─────────────── */
const _origSendQuery = sendQuery;
async function sendQuery() {
  window._lastQuery = document.getElementById('query-input').value.trim();
  await _origSendQuery();
}

/* ─── Init ───────────────────────────────────────────────────── */
loadBookmarks();
renderBookmarks();
buildStepRow();

// Quick connectivity check on load
fetch(`${API}/queries`)
  .then(() => { setDot(true); })
  .catch(() => {
    setDot(false);
    setStatus(`Motia API not reachable at ${API} — run: npm run dev`);
  });
</script>
